spring:
  application:
    name: AutoPecas

  datasource:
    # URL para o container de Vendas (porta 3306)
    url: jdbc:mysql://localhost:3306/vendas_db
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      # Cria as tabelas automaticamente baseado nas suas classes @Entity
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect

logging:
  level:
    org.hibernate.SQL: DEBUG